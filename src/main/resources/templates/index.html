<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🚀 AI Code Explainer PRO</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
body { margin:0; background:#343541; font-family:"Segoe UI"; color:#ececf1; }
.app { display:flex; height:100vh; }

.sidebar {
  width:260px; background:#202123; padding:15px; border-right:1px solid #444;
}
.chat-item { padding:8px; cursor:pointer; border-radius:6px; }
.chat-item:hover { background:#2a2b32; }

.chat-container { flex:1; display:flex; flex-direction:column; }
.header { background:#202123; padding:12px; text-align:center; border-bottom:1px solid #444; }
.chat-box { flex:1; overflow-y:auto; padding:20px; }

.msg { display:flex; margin-bottom:15px; }
.user { justify-content:flex-end; }
.bot { justify-content:flex-start; }

.bubble {
  padding:12px 16px; border-radius:12px; max-width:70%; position:relative;
}
.user .bubble { background:#10a37f; color:#fff; }
.bot .bubble { background:#444654; }

.copy-btn {
  position:absolute; top:5px; right:8px; cursor:pointer; font-size:12px;
}

pre { position:relative; }
.code-copy {
  position:absolute; top:5px; right:5px; cursor:pointer;
}

.input-area { background:#202123; padding:15px; border-top:1px solid #444; }
textarea { background:#40414f !important; color:#fff !important; border:none !important; }
</style>
</head>

<body>
<div class="app">

	<div class="sidebar">
	  <h5>💬 Chats</h5>

	
	  <div class="d-flex gap-2 mb-3">
	    
	    <button class="btn btn-success flex-fill d-flex align-items-center justify-content-center" onclick="newChat()">
	      ➕ <span class="ms-1">New</span>
	    </button>

	    <button class="btn btn-danger flex-fill d-flex align-items-center justify-content-center" onclick="clearAllChats()">
	      🗑 <span class="ms-1">Clear</span>
	    </button>

	  </div>

	  <div id="chatList"></div>
	</div>



<div class="chat-container">
  <div class="header">🤖 AI Code Explainer</div>

  <div class="container mt-2">
    <select id="modelSelect" class="form-select mb-2">
      <option value="online">🌐 Online Model</option>
      <option value="local">🔒 Local Model</option>
    </select>
  </div>

  <div class="chat-box" id="chatBox"></div>

  <div class="input-area">
    <div class="input-group">
      <textarea id="userInput" class="form-control" rows="2" placeholder="Ask anything..."></textarea>
      <button class="btn btn-success" onclick="sendMessage()">Send</button>
    </div>
  </div>
</div>

</div>

<script>

let chats = JSON.parse(localStorage.getItem("allChats") || "[]");
let currentChatId = null;

function saveChats(){
  localStorage.setItem("allChats", JSON.stringify(chats));
}

function renderChatList(){
  let list = document.getElementById("chatList");
  list.innerHTML = "";
  chats.forEach(c => {
    let div = document.createElement("div");
    div.className = "chat-item";
    div.innerText = c.title;
    div.onclick = () => loadChat(c.id);
    list.appendChild(div);
  });
}

function clearAllChats(){
  if(confirm("Are you sure you want to delete all chats?")){
    
    localStorage.removeItem("allChats"); //  clear storage fuction
    
    chats = []; // reset array
    currentChatId = null;

    document.getElementById("chatBox").innerHTML = ""; // clear UI
    document.getElementById("chatList").innerHTML = "";

    newChat(); // create fresh chat

    alert("All chats cleared ✅");
  }
}

function newChat(){
  let id = Date.now();
  chats.push({id, title:"New Chat", messages:[]});
  currentChatId = id;
  saveChats();
  renderChatList();
  document.getElementById("chatBox").innerHTML = "";
}

function loadChat(id){
  currentChatId = id;
  let chat = chats.find(c=>c.id===id);
  document.getElementById("chatBox").innerHTML = chat.messages.join("");
  hljs.highlightAll();
}

function saveMessage(html){
  let chat = chats.find(c=>c.id===currentChatId);
  chat.messages.push(html);
  if(chat.messages.length === 1){
    chat.title = html.replace(/<[^>]*>/g, "").substring(0,20);
  }
  saveChats();
}

function copyText(text){
  navigator.clipboard.writeText(text);
}

function addCopyBtn(el,text){
  let btn=document.createElement("span");
  btn.className="copy-btn";
  btn.innerText="📋";
  btn.onclick=()=>copyText(text);
  el.appendChild(btn);
}

function enhanceCodeBlocks(){
  document.querySelectorAll("pre").forEach(block=>{
    let btn=document.createElement("span");
    btn.className="code-copy";
    btn.innerText="📋";
    btn.onclick=()=>copyText(block.innerText);
    block.appendChild(btn);
  });
}

function streamText(text, el){
  let i=0;
  function t(){
    if(i<text.length){
      el.innerHTML += text[i];
      i++;
      setTimeout(t,10);
    }
  }
  t();
}

function sendMessage(){
  let input=document.getElementById("userInput").value;
  if(!input) return;

  let chatBox=document.getElementById("chatBox");

  let userHtml=`<div class="msg user"><div class="bubble">${input}</div></div>`;
  chatBox.innerHTML+=userHtml;
  saveMessage(userHtml);

  let userBubble=chatBox.querySelectorAll(".user .bubble");
  addCopyBtn(userBubble[userBubble.length-1],input);

  document.getElementById("userInput").value="";

  let botDiv=document.createElement("div");
  botDiv.className="msg bot";

  let bubble=document.createElement("div");
  bubble.className="bubble";
  botDiv.appendChild(bubble);
  chatBox.appendChild(botDiv);

  let selectedModel = document.getElementById("modelSelect").value;

  // only one API
  fetch("/api/explain",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({code:input, model:selectedModel})
  })
  .then(res=>res.text())
  .then(data=>{
      let html = marked.parse(data);

      html = html
        .replace(/<p[^>]*>/g, "")
        .replace(/<\/p>/g, "<br>")
        .replace(/<li[^>]*>/g, "• ")
        .replace(/<\/li>/g, "<br>")
        .replace(/<\/?ul[^>]*>/g, "")
        .replace(/<\/?ol[^>]*>/g, "");

      bubble.innerHTML = html;

      addCopyBtn(bubble,data);

      setTimeout(()=>{
        hljs.highlightAll();
        enhanceCodeBlocks();

        //  SAVE (no duplicate)
        saveMessage(`<div class="msg bot"><div class="bubble">${html}</div></div>`);

      },1000);
  })
  .catch(()=>{
    bubble.innerHTML="❌ Error";
  });
}

window.onload=()=>{
  renderChatList();
  if(chats.length>0){
    loadChat(chats[0].id);
    currentChatId=chats[0].id;
  } else {
    newChat();
  }
};

</script>
</body>
</html>
